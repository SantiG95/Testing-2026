spring.application.name=e-commerce3

# H2 Database (se reinicia al parar la app)
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console


# 1. Configuración de la Fuente de Datos
# En producción, DB_URL se configura como variable de entorno en Railway/Render
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db3?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# 2. Driver específico (Cuidado aquí: si usas MySQL, NO menciones a H2)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 4. JWT
jwt.secret=${JWT_SECRET:MiSuperSecretoJwtClave123456789012}
jwt.expiration=${JWT_EXPIRATION:86400000}

# 5. Puerto — Railway/Render inyectan $PORT automáticamente
server.port=${PORT:8080}

# 6. Actuator — expone /actuator/health para health checks de la plataforma
management.endpoints.web.exposure.include=health,info
