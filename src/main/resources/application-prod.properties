# ============================================================
# Perfil PRODUCCIÓN — sobreescribe application.properties
# Activar con: --spring.profiles.active=prod
# En Railway: variable de entorno SPRING_PROFILES_ACTIVE=prod
# ============================================================

# Base de datos — sin valores por defecto, deben estar en las env vars
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# validate: Hibernate verifica que el esquema exista pero NO lo modifica
# Más seguro que "update" en producción para evitar migraciones accidentales
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT — sin valor por defecto: si no está definida la app no arranca
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Puerto inyectado por Railway/Render
server.port=${PORT:8080}

# Actuator — solo health para el health check de la plataforma
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logs — menos ruido en producción
logging.level.root=WARN
logging.level.com.uade.tpo=INFO
logging.level.org.springframework.security=WARN
